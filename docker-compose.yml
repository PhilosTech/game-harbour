services:
  postgres:
    image: postgres:16-alpine
    container_name: gamehubber-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gamehubber
      POSTGRES_PASSWORD: gamehubber
      POSTGRES_DB: gamehubber
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamehubber -d gamehubber"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gamehubber-minio
    restart: unless-stopped
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: gamehubber
      MINIO_ROOT_PASSWORD: gamehubber_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: gamehubber-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 gamehubber gamehubber_secret;
      mc mb local/gamehubber --ignore-existing;
      mc anonymous set download local/gamehubber;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
